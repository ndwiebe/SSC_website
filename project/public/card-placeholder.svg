<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141417"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B7318"/>
      <stop offset="50%" style="stop-color:#C9A227"/>
      <stop offset="100%" style="stop-color:#8B7318"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A227;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#C9A227;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#C9A227;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="250" height="350" fill="url(#bgGrad)"/>
  
  <!-- Inner border -->
  <rect x="8" y="8" width="234" height="334" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>
  
  <!-- Subtle grid pattern -->
  <line x1="125" y1="8" x2="125" y2="342" stroke="#2A2A35" stroke-width="0.5" opacity="0.3"/>
  <line x1="8" y1="175" x2="242" y2="175" stroke="#2A2A35" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Card icon -->
  <g transform="translate(125, 140)" opacity="0.25">
    <!-- Outer card shape -->
    <rect x="-30" y="-42" width="60" height="84" rx="3" fill="none" stroke="#C9A227" stroke-width="1.5"/>
    <!-- Inner card detail -->
    <rect x="-22" y="-34" width="44" height="30" fill="none" stroke="#C9A227" stroke-width="0.75" opacity="0.6"/>
    <line x1="-22" y1="4" x2="22" y2="4" stroke="#C9A227" stroke-width="0.75" opacity="0.4"/>
    <line x1="-22" y1="12" x2="10" y2="12" stroke="#C9A227" stroke-width="0.75" opacity="0.4"/>
    <line x1="-22" y1="20" x2="15" y2="20" stroke="#C9A227" stroke-width="0.75" opacity="0.4"/>
  </g>
  
  <!-- "PHOTO" text -->
  <text x="125" y="210" text-anchor="middle" fill="#C9A227" font-family="Impact, sans-serif" font-size="16" letter-spacing="4" opacity="0.5">PHOTO</text>
  
  <!-- "COMING SOON" text -->
  <text x="125" y="232" text-anchor="middle" fill="#A8A8B3" font-family="Impact, sans-serif" font-size="11" letter-spacing="3" opacity="0.35">COMING SOON</text>
  
  <!-- Bottom accent line -->
  <rect x="85" y="250" width="80" height="1" fill="url(#goldGrad)" opacity="0.3"/>
  
  <!-- Corner accents -->
  <line x1="12" y1="12" x2="32" y2="12" stroke="#C9A227" stroke-width="1" opacity="0.2"/>
  <line x1="12" y1="12" x2="12" y2="32" stroke="#C9A227" stroke-width="1" opacity="0.2"/>
  <line x1="238" y1="12" x2="218" y2="12" stroke="#C9A227" stroke-width="1" opacity="0.2"/>
  <line x1="238" y1="12" x2="238" y2="32" stroke="#C9A227" stroke-width="1" opacity="0.2"/>
  <line x1="12" y1="338" x2="32" y2="338" stroke="#C9A227" stroke-width="1" opacity="0.2"/>
  <line x1="12" y1="338" x2="12" y2="318" stroke="#C9A227" stroke-width="1" opacity="0.2"/>
  <line x1="238" y1="338" x2="218" y2="338" stroke="#C9A227" stroke-width="1" opacity="0.2"/>
  <line x1="238" y1="338" x2="238" y2="318" stroke="#C9A227" stroke-width="1" opacity="0.2"/>
</svg>